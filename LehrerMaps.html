<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LehrerMaps — Ordnerstruktur</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" />

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app/chrome.jsx"></script>
<script type="text/babel" src="app/shared.jsx"></script>
<script type="text/babel" src="app/variant-notebook.jsx"></script>
<script type="text/babel" src="app/variant-columns.jsx"></script>
<script type="text/babel" src="app/variant-dashboard.jsx"></script>
<script type="text/babel" src="app/variant-spatial.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "activeSubject": "spanisch",
  "dark": false
}/*EDITMODE-END*/;

const SUBJECT_OPTIONS = [
  { id: 'spanisch',    label: 'Spanisch',       color: '#E8472A' },
  { id: 'informatik',  label: 'Informatik',     color: '#2563EB' },
  { id: 'sport',       label: 'Sport',          color: '#16A34A' },
  { id: 'klasse',      label: 'Klassenleitung', color: '#9333EA' },
];

const W = 1240, H = 820;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="layouts"
          title="LehrerMaps · Layout-Varianten"
          subtitle="Vier Informationsarchitekturen für deine Ordnerstruktur. Akzentfarbe & Theme global über Tweaks steuerbar."
        >
          <DCArtboard id="notebook" label="A · Notizbuch (macOS)" width={W} height={H}>
            <MacChrome title="LehrerMaps · Notizbuch" accent={SUBJECTS.find(s => s.id === t.activeSubject).color}>
              <VariantNotebook activeSubjectId={t.activeSubject} dark={t.dark} />
            </MacChrome>
          </DCArtboard>

          <DCArtboard id="columns" label="B · Drei-Spalten (Windows 11)" width={W} height={H}>
            <WinChrome title="LehrerMaps · Spalten" accent={SUBJECTS.find(s => s.id === t.activeSubject).color}>
              <VariantColumns activeSubjectId={t.activeSubject} dark={t.dark} />
            </WinChrome>
          </DCArtboard>

          <DCArtboard id="dashboard" label="C · Atelier-Dashboard (GNOME / Linux)" width={W} height={H}>
            <LinuxChrome title="LehrerMaps · Dashboard" accent={SUBJECTS.find(s => s.id === t.activeSubject).color}>
              <VariantDashboard activeSubjectId={t.activeSubject} dark={t.dark} />
            </LinuxChrome>
          </DCArtboard>

          <DCArtboard id="spatial" label="D · Spatial (macOS)" width={W} height={H}>
            <MacChrome title="LehrerMaps · Atelier" accent={SUBJECTS.find(s => s.id === t.activeSubject).color}>
              <VariantSpatial activeSubjectId={t.activeSubject} dark={t.dark} />
            </MacChrome>
          </DCArtboard>
        </DCSection>

        <DCPostIt top={20} left={32} rotate={-3} width={210}>
          Tweaks → Fach wechseln,<br />Dark Mode togglen.<br />Pinch/scroll zum Zoomen.
        </DCPostIt>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Aktives Fach" />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
          {SUBJECT_OPTIONS.map(s => (
            <button
              key={s.id}
              onClick={() => setTweak('activeSubject', s.id)}
              style={{
                appearance: 'none',
                border: '0.5px solid ' + (t.activeSubject === s.id ? s.color : 'rgba(0,0,0,0.1)'),
                background: t.activeSubject === s.id ? s.color + '15' : 'rgba(255,255,255,.6)',
                borderRadius: 8, padding: '8px 10px', cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 8,
                font: 'inherit', textAlign: 'left',
              }}
            >
              <span style={{
                width: 12, height: 12, borderRadius: 3, background: s.color,
                boxShadow: t.activeSubject === s.id ? `0 0 0 2px ${s.color}33` : 'none',
              }} />
              <span style={{ fontSize: 11.5, fontWeight: t.activeSubject === s.id ? 600 : 500 }}>{s.label}</span>
            </button>
          ))}
        </div>

        <TweakSection label="Erscheinungsbild" />
        <TweakToggle label="Dark Mode" value={t.dark} onChange={(v) => setTweak('dark', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
