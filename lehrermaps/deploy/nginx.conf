# LehrerMaps — Nginx Reverse-Proxy + statisches Frontend (PWA-tauglich)
# Ersetze DEIN-DOMAIN.de und die Pfade. Zertifikate via certbot (siehe DEPLOY.md).

# HTTP -> HTTPS erzwingen (PWA/Service Worker braucht Secure Context)
server {
    listen 80;
    listen [::]:80;
    server_name DEIN-DOMAIN.de www.DEIN-DOMAIN.de;
    # ACME-Challenge fuer Let's Encrypt durchlassen
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DEIN-DOMAIN.de www.DEIN-DOMAIN.de;

    # --- TLS (certbot fuellt diese Pfade) ---
    ssl_certificate     /etc/letsencrypt/live/DEIN-DOMAIN.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DEIN-DOMAIN.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # --- Statisches Frontend (der committete client/dist Build) ---
    root /var/www/lehrermaps/client/dist;
    index index.html;

    client_max_body_size 300m;   # grosse Uploads (Multer, 300 MB)

    # Gehashte Assets: unveraenderlich, lange cachen
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker + Manifest: NIE lange cachen, sonst kommen Updates nie an
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # REST-API -> Express (Port aus server/.env, Default 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 300m;
    }

    # Socket.io / Terminal — Pfad ist /ws (server/index.js: path:'/ws'), NICHT /socket.io
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA-Fallback: unbekannte Routen -> index.html (echte Dateien zuerst)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
